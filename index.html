<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공룡지훈 선인장 피하기 게임(ver1.3)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #e0f2fe, #bae6fd);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 60px;
        }
        /* 🎯 상단 메인 타이틀 스타일 */
        #main-title {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: 800;
            color: #1e40af;
            background-color: rgba(255, 255, 255, 0.6);
            padding: 6px 16px;
            border-radius: 20px;
            border: 2px solid #93c5fd;
            white-space: nowrap;
            z-index: 10;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        /* 점수 및 레벨 UI 위치를 타이틀 아래로 살짝 내렸습니다 */
        #ui {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #1e3a8a;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 1px 1px 2px white;
        }
        #ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #4ade80;
            border-top: 4px solid #22c55e;
            z-index: 2;
        }
        .emoji {
            position: absolute;
            font-size: 55px;
            bottom: 60px;
            transition: bottom 0.18s ease-out;
        }
        #dino {
            left: 60px;
            z-index: 5;
        }
        #chaser {
            left: -120px;
            font-size: 85px;
            z-index: 4;
            transition: left 0.4s ease-out;
        }
        #obstacle {
            right: -100px;
            z-index: 5;
            animation: moveObstacle linear forwards;
        }
        @keyframes moveObstacle {
            0% { right: -100px; }
            100% { right: 115vw; }
        }
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.85);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        #game-over-screen h1 { 
            font-size: 42px; 
            color: #fde047; 
            margin-bottom: 10px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #game-over-screen p { font-size: 26px; margin-bottom: 30px; }
        #restart-btn {
            padding: 16px 40px;
            font-size: 22px;
            background: linear-gradient(to right, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="main-title">공룡지훈 선인장 피하기 게임(ver1.3)</div>

        <div id="ui">
            <div>점수: <span id="score">0</span></div>
            <div>레벨: <span id="level">1</span></div>
        </div>
        
        <div id="dino" class="emoji">🦖</div>
        <div id="chaser" class="emoji">🐊</div>
        <div id="obstacle" class="emoji">🌵</div>
        <div id="ground"></div>
        
        <div id="game-over-screen">
            <h1>🦖 지훈이 잡혔다! 🏃‍♂️</h1>
            <p>최종 점수: <span id="final-score">0</span>점</p>
            <button id="restart-btn">다시 도전하기</button>
        </div>
    </div>

    <script>
        const dino = document.getElementById('dino');
        const chaser = document.getElementById('chaser');
        const obstacle = document.getElementById('obstacle');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');

        let score = 0;
        let level = 1;
        let isJumping = false;
        let gameActive = true;
        let obstacleSpeed = 2.8;
        let animationFrameId;

        function jump() {
            if (!gameActive || isJumping) return;
            isJumping = true;
            
            dino.style.bottom = '220px'; 
            
            setTimeout(() => {
                dino.style.bottom = '60px'; 
                setTimeout(() => {
                    isJumping = false;
                }, 150);
            }, 400);
        }

        function handleInput(e) {
            if (e.target.id === 'restart-btn') return;
            jump();
        }

        window.addEventListener('pointerdown', handleInput); 

        restartBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation(); 
            resetGame();
        });

        function checkCollision() {
            if (!gameActive) return;

            const dinoRect = dino.getBoundingClientRect();
            const obstacleRect = obstacle.getBoundingClientRect();

            if (
                dinoRect.right - 15 > obstacleRect.left &&
                dinoRect.left + 15 < obstacleRect.right &&
                dinoRect.bottom - 10 > obstacleRect.top &&
                dinoRect.top < obstacleRect.bottom
            ) {
                if (!isJumping) {
                    endGame();
                    return;
                }
            }

            if (obstacleRect.right < 0 && obstacleRect.left !== 0) {
                score++;
                scoreDisplay.innerText = score;
                respawnObstacle();
                
                if (score % 5 === 0) {
                    level++;
                    levelDisplay.innerText = level;
                    if (obstacleSpeed > 1.2) {
                        obstacleSpeed -= 0.25;
                        obstacle.style.animationDuration = `${obstacleSpeed}s`;
                    }
                }
            }
            
            const chaserPosition = -130 + (score * 6);
            if (chaserPosition < 15) {
                chaser.style.left = `${chaserPosition}px`;
            } else {
                chaser.style.left = '15px';
            }

            animationFrameId = requestAnimationFrame(checkCollision);
        }

        function respawnObstacle() {
            obstacle.style.animation = 'none';
            obstacle.offsetHeight; 
            obstacle.style.animation = `moveObstacle ${obstacleSpeed}s linear forwards`;
        }

        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationFrameId);
            dino.innerText = '💥'; 
            chaser.style.left = '60px'; 
            finalScoreDisplay.innerText = score;
            gameOverScreen.style.display = 'flex';
            obstacle.style.animationPlayState = 'paused';
        }

        function resetGame() {
            score = 0;
            level = 1;
            obstacleSpeed = 2.8;
            gameActive = true;
            isJumping = false;
            dino.innerText = '🦖';
            dino.style.bottom = '60px';
            chaser.style.left = '-130px';
            scoreDisplay.innerText = score;
            levelDisplay.innerText = level;
            gameOverScreen.style.display = 'none';
            obstacle.style.animationPlayState = 'running';
            
            cancelAnimationFrame(animationFrameId);
            respawnObstacle();
            checkCollision();
        }

        window.onload = () => {
            resetGame();
        };
    </script>
</body>
</html>
